server:
  port: 86

spring:
  application:
    name: rag-server

  main:
    web-application-type: servlet

  datasource:
    url: jdbc:postgresql://localhost:5432/ragdb
    username: raguser
    password: ragpassword
    driver-class-name: org.postgresql.Driver

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
      #           temperature: 0.3
      embedding:
        options:
          model: text-embedding-3-small

    vectorstore:
      pgvector:
        index-type: HNSW # NONE | IVFFLAT | HNSW
        distance-type: COSINE_DISTANCE # EUCLIDEAN_DISTANCE | COSINE_DISTANCE | NEGATIVE_INNER_PRODUCT
        dimensions: 1536 # text-embedding-3-small = 1536차원
        initialize-schema: true # 앱 기동 시 vector_store 테이블 자동 생성
        schema-name: public
        table-name: vector_store

logging:
  level:
    org.springframework.ai: DEBUG
    com.rag: DEBUG

# RAG 서버 설정: 파일 업로드 서버와 공유하는 파일 저장 경로
rag:
  file:
    base-path: /uploads # 업로드 서버와 공유 마운트 경로 (NFS, S3 마운트 등)
