<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>유사도 검색 | Oracle RAG</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI','Apple SD Gothic Neo',sans-serif; background:#f0f4f8; color:#2d3748; min-height:100vh; }
        nav { background:linear-gradient(135deg,#1a365d 0%,#2b6cb0 100%); padding:0 2rem; display:flex; align-items:center; gap:2rem; height:56px; box-shadow:0 2px 8px rgba(0,0,0,.25); }
        nav .brand { color:#fff; font-size:1.1rem; font-weight:700; text-decoration:none; }
        nav a { color:#bee3f8; text-decoration:none; font-size:.9rem; padding:.25rem .5rem; border-radius:4px; transition:background .2s; }
        nav a:hover { background:rgba(255,255,255,.15); color:#fff; }
        nav a.active { background:rgba(255,255,255,.2); color:#fff; font-weight:600; }
        .container { max-width:860px; margin:2rem auto; padding:0 1rem; }
        .card { background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.08); padding:2rem; margin-bottom:1.5rem; }
        .card h2 { font-size:1.2rem; color:#2b6cb0; margin-bottom:1.25rem; border-bottom:2px solid #ebf4ff; padding-bottom:.6rem; }
        .form-group { margin-bottom:1rem; }
        .form-group label { display:block; font-size:.85rem; font-weight:600; color:#4a5568; margin-bottom:.35rem; }
        .form-control { width:100%; padding:.55rem .8rem; border:1.5px solid #cbd5e0; border-radius:8px; font-size:.9rem; transition:border-color .2s; outline:none; }
        .form-control:focus { border-color:#3182ce; box-shadow:0 0 0 3px rgba(49,130,206,.15); }
        .btn { display:inline-block; padding:.6rem 1.4rem; border:none; border-radius:8px; font-size:.9rem; font-weight:600; cursor:pointer; transition:filter .2s; }
        .btn-primary { background:#3182ce; color:#fff; }
        .btn-primary:hover { filter:brightness(1.1); }
        .row { display:flex; gap:1rem; flex-wrap:wrap; }
        .col { flex:1; min-width:160px; }
        .alert { padding:.9rem 1.1rem; border-radius:8px; margin-bottom:1rem; font-size:.9rem; }
        .alert-danger { background:#fff5f5; border:1px solid #feb2b2; color:#9b2c2c; }
        .result-count { font-size:.88rem; color:#718096; margin-bottom:1rem; }
        .result-item { border:1.5px solid #e2e8f0; border-radius:10px; padding:1rem 1.2rem; margin-bottom:.9rem; background:#f7fafc; }
        .result-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:.5rem; }
        .score-badge { background:#ebf4ff; color:#2b6cb0; font-size:.78rem; font-weight:700; padding:.15rem .55rem; border-radius:999px; }
        .rank-badge { background:#fefcbf; color:#744210; font-size:.78rem; font-weight:700; padding:.15rem .55rem; border-radius:999px; }
        .content-text { font-size:.87rem; line-height:1.7; color:#4a5568; white-space:pre-wrap; word-break:break-word; max-height:200px; overflow-y:auto; }
        .meta-row { margin-top:.55rem; font-size:.78rem; color:#718096; display:flex; gap:1rem; flex-wrap:wrap; }
        .meta-tag { background:#edf2f7; border-radius:4px; padding:.1rem .4rem; }
        .empty-state { text-align:center; padding:3rem; color:#a0aec0; font-size:.95rem; }
    </style>
</head>
<body>

<nav>
    <a class="brand" href="/">🔮 Oracle RAG</a>
    <a href="/">📤 문서 등록</a>
    <a href="/search" class="active">🔍 유사도 검색</a>
    <a href="/ask">🤖 AI 질의응답</a>
</nav>

<div class="container">

    <!-- ── 검색 폼 ── -->
    <div class="card">
        <h2>🔍 벡터 유사도 검색</h2>
        <form th:action="@{/search}" method="get">

            <div class="form-group">
                <label for="query">검색 쿼리</label>
                <input type="text" id="query" name="query" class="form-control"
                       placeholder="예: Spring AI 벡터 스토어 사용법"
                       th:value="${query}" required autofocus/>
            </div>

            <div class="row">
                <div class="col form-group">
                    <label for="topK">최대 결과 수 (Top-K)</label>
                    <input type="number" id="topK" name="topK" class="form-control"
                           min="1" max="20" th:value="${topK}"/>
                </div>
                <div class="col form-group">
                    <label for="threshold">유사도 임계값 (0.0 ~ 1.0)</label>
                    <input type="number" id="threshold" name="threshold" class="form-control"
                           min="0" max="1" step="0.05" th:value="${threshold}"/>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">🔎 검색</button>
        </form>
    </div>

    <!-- ── 에러 ── -->
    <div th:if="${searchError}" class="alert alert-danger">
        ❌ <span th:text="${searchError}"></span>
    </div>

    <!-- ── 검색 결과 ── -->
    <div th:if="${results != null}" class="card">
        <h2>📋 검색 결과</h2>

        <div th:if="${results.isEmpty()}" class="empty-state">
            검색 결과가 없습니다. 다른 쿼리나 낮은 임계값으로 시도해 보세요.
        </div>

        <div th:unless="${results.isEmpty()}">
            <p class="result-count" th:text="'총 ' + ${resultCount} + '개 문서 검색됨'"></p>

            <div th:each="result, stat : ${results}" class="result-item">
                <div class="result-header">
                    <span class="rank-badge" th:text="'#' + ${stat.index + 1}"></span>
                    <span class="score-badge"
                          th:text="'유사도: ' + ${#numbers.formatDecimal(result.score, 1, 4)}"></span>
                </div>

                <div class="content-text" th:text="${result.content}"></div>

                <div class="meta-row">
                    <span th:if="${result.metadata['source_file']}" class="meta-tag"
                          th:text="'📄 ' + ${result.metadata['source_file']}"></span>
                    <span th:if="${result.metadata['category']}" class="meta-tag"
                          th:text="'🏷 ' + ${result.metadata['category']}"></span>
                    <span th:if="${result.metadata['content_type']}" class="meta-tag"
                          th:text="${result.metadata['content_type']}"></span>
                    <span class="meta-tag" th:text="'ID: ' + ${result.id?.substring(0,8)} + '...'"></span>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
